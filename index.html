<!doctype html>
<html lang="en" class="title-open">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Helvetic Freight Development Build</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="titleScreen" class="title-screen">
    <div class="title-card">
      <p class="eyebrow">Helvetic Freight</p>
      <h1>Logistics CH</h1>
      <p>Structured development build that preserves the legacy gameplay surface for migration and smoke testing.</p>
      <div class="title-actions">
        <button id="newGame" class="btn primary">＋ New Game</button>
        <button id="loadTitle" class="btn secondary">▶ Load Game</button>
      </div>
      <a href="/legacy/Helvetic_Freight_v1.1.5.html">Open immutable legacy reference</a>
    </div>
  </div>
  <div id="app">
    <section id="map" aria-label="Swiss map"></section>
    <aside class="side">
      <header class="topbar">
        <div class="brand"><div class="brandmark">↔</div><div><h1>LOGISTICS</h1><small>CH</small></div></div>
        <div class="stats"><div class="stat"><span>Cash</span><b id="cash"></b></div><div class="stat"><span>Time</span><b id="day"></b></div><div class="stat"><span>Network</span><b id="networkStat"></b></div></div>
      </header>
      <nav id="tabs" class="tabs"></nav>
      <main id="content" class="content"></main>
      <footer class="footer"><button id="saveFooter" class="btn secondary">Save</button><button id="nextHour" class="btn blue">+1 hour</button><button id="nextDay" class="btn primary">+1 day</button></footer>
    </aside>
  </div>
  <div id="status" class="status" role="status">Ready.</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
